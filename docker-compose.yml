services:
  telepirate:
    depends_on:
      - surrealdb
      - telegram-api
    container_name: telepirate
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile-telepirate
    volumes:
      - ./cookies.json:/app/cookies.json
    environment:
      - TELOXIDE_TOKEN=${TELOXIDE_TOKEN}
    env_file: ./.env
    cap_drop:
      - ALL
    restart: always
    stop_grace_period: 1s

  surrealdb:
    container_name: surrealdb
    image: surrealdb/surrealdb:v1.5.6
    command: ["start", "--log", "info", "--user", "root", "--pass", "root", "memory"]
    cap_drop:
      - ALL
    restart: always
    stop_grace_period: 1s

  telegram-api:
    container_name: telegram-api
    build:
      dockerfile: ./dockerfiles/Dockerfile-telegram-api
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    env_file: ./.env
    cap_drop:
      - ALL
    restart: always
    stop_grace_period: 1s

networks:
  piranet:
    name: piranet
    driver: bridge

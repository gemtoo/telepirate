[package]
name = "telepirate"
version = "1.6.3"
edition = "2021"

[profile.dev]
strip = true
opt-level = 0
codegen-units = 256

[profile.release]
strip = true
opt-level = 0
codegen-units = 256

[dependencies]
colored = { version = "3.0.0", features = ["no-color"] }
ctrlc = { version = "3.4.5", features = ["termination"] }
fern = { version = "0.7.1", features = ["colored"] }
glob = "0.3.2"
humantime = "2.1.0"
log = "0.4.26"
regex = "1.11.1"
reqwest = "0.11.27"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
surrealdb = { version = "2.2.1", default-features = false, features = ["protocol-ws"] }
teloxide = { version = "0.13.0", features = ["webhooks-axum", "macros"] }
tokio = { version = "1.43.0", features = ["rt-multi-thread", "macros"] }
uuid = { version = "1.14.0", default-features = false, features = ["v4"] }
validators = { version = "0.25.3", features = ["url", "derive", "http_url"], default-features = false }
walkdir = "2.5.0"
ytd-rs = { version = "0.1.7", features = ["yt-dlp"] }
